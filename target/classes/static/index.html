<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management | System Status</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-group">
                <h1><i class="fas fa-graduation-cap"></i> Student API</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Backend Integration Monitor</p>
            </div>
            <div id="connectionStatus" class="status-badge disconnected">
                <span class="pulse"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </header>

        <main class="card">
            <div class="card-header">
                <h2>Database Records</h2>
                <button class="refresh-btn" style="background: var(--success); margin-right: 10px;" onclick="addTestStudent()">
                    <i class="fas fa-plus"></i> Add Test
                </button>
                <button class="refresh-btn" onclick="fetchStudents()">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
            </div>

            <div class="table-container">
                <table id="studentTable">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Age</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-database"></i>
                    <p>No students found in the database.</p>
                </div>
                <div id="errorState" class="empty-state" style="display: none; color: var(--error);">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Could not connect to the backend server. Please ensure the Spring Boot app is running.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '/api/students';
        const statusBadge = document.getElementById('connectionStatus');
        const statusText = statusBadge.querySelector('.status-text');
        const studentList = document.getElementById('studentList');
        const emptyState = document.getElementById('emptyState');
        const errorState = document.getElementById('errorState');
        const studentTable = document.getElementById('studentTable');

        async function checkConnection() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    setConnected(true);
                    return true;
                }
            } catch (error) {
                setConnected(false);
                return false;
            }
        }

        function setConnected(isConnected) {
            if (isConnected) {
                statusBadge.classList.replace('disconnected', 'connected');
                statusText.innerText = 'System Live';
                errorState.style.display = 'none';
            } else {
                statusBadge.classList.replace('connected', 'disconnected');
                statusText.innerText = 'Disconnected';
                studentTable.style.display = 'none';
                emptyState.style.display = 'none';
                errorState.style.display = 'block';
            }
        }

        async function fetchStudents() {
            const isConnected = await checkConnection();
            if (!isConnected) return;

            try {
                const response = await fetch(API_URL);
                const students = await response.json();
                
                renderStudents(students);
            } catch (error) {
                setConnected(false);
            }
        }

        function renderStudents(students) {
            studentList.innerHTML = '';
            
            if (students.length === 0) {
                studentTable.style.display = 'table';
                emptyState.style.display = 'block';
            } else {
                studentTable.style.display = 'table';
                emptyState.style.display = 'none';
                
                students.forEach((student, index) => {
                    const row = document.createElement('tr');
                    row.className = 'student-row';
                    row.style.animationDelay = `${index * 0.1}s`;
                    
                    row.innerHTML = `
                        <td>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div class="avatar">${student.name.charAt(0)}</div>
                                <span>${student.name}</span>
                            </div>
                        </td>
                        <td style="color: var(--text-muted);">#${student.id}</td>
                        <td>${student.email}</td>
                        <td>
                            <span style="background: rgba(255,255,255,0.05); padding: 0.25rem 0.75rem; border-radius: 6px;">
                                ${student.age}
                            </span>
                        </td>
                    `;
                    studentList.appendChild(row);
                });
            }
        }

        async function addTestStudent() {
            const names = ["Alice", "Bob", "Charlie", "Diana", "Ethan"];
            const randomName = names[Math.floor(Math.random() * names.length)];
            const studentData = {
                name: randomName,
                email: `${randomName.toLowerCase()}@example.com`,
                age: Math.floor(Math.random() * 20) + 18
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });
                
                if (response.ok) {
                    fetchStudents();
                }
            } catch (error) {
                setConnected(false);
            }
        }

        // Initial fetch
        fetchStudents();
        
        // Auto-refresh connection status every 10 seconds
        setInterval(checkConnection, 10000);
    </script>
</body>
</html>
